services:
  slides:
    image: ${IMAGE:-ghcr.io/victoraguilarc/agentic-programming:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-programming-slides
    restart: unless-stopped
    ports:
      - "12080:8080"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - shared-network

networks:
  shared-network:
    external: true
