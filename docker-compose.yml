services:
  slides:
    image: ${IMAGE:-ghcr.io/victoraguilarc/agentic-programming:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-programming-slides
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      # Traefik (optional — habilita si lo expones tras Traefik en Portainer)
      - "traefik.enable=false"
      - "traefik.http.routers.slides.rule=Host(`${PUBLIC_HOST:-slides.example.com}`)"
      - "traefik.http.routers.slides.entrypoints=websecure"
      - "traefik.http.routers.slides.tls.certresolver=letsencrypt"
      - "traefik.http.services.slides.loadbalancer.server.port=8080"
    networks:
      - web

networks:
  web:
    driver: bridge
